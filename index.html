<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>墨语 Ink Mandarin — Learn Chinese</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=Inter:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#FAF7F2; --ink:#1C1C1E; --red:#C0392B; --gold:#C9A227;
  --card:#FFFFFF; --line:#E8E0D5; --muted:#8A8378; --soft:#F3EEE6;
  --ok:#2E8B57; --okbg:#E8F5EE; --bad:#C0392B; --badbg:#FBEAE8;
  --shadow:0 2px 10px rgba(28,28,30,.06), 0 1px 3px rgba(28,28,30,.05);
  --shadow-lg:0 10px 30px rgba(28,28,30,.10);
  --flip:.55s; --rad:18px; --radS:12px;
  --tabh:64px; --headh:58px;
}
body.dark{
  --bg:#171411; --ink:#F1EAE0; --card:#221E19; --line:#3A332B;
  --muted:#9C9387; --soft:#2A251F; --okbg:#1E3328; --badbg:#3A211E;
  --shadow:0 2px 10px rgba(0,0,0,.35), 0 1px 3px rgba(0,0,0,.3);
  --shadow-lg:0 10px 30px rgba(0,0,0,.5);
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;}
html{height:100%;}
body{
  background:var(--bg); color:var(--ink);
  font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
  font-size:16px; line-height:1.5;
  min-height:100vh; min-height:100dvh;
  overscroll-behavior-y:none;
  transition:background .3s,color .3s;
}
.zh{font-family:'Noto Serif SC','Songti SC','STSong','PingFang SC',serif;}
.py{font-family:'Inter',sans-serif; font-style:italic; color:var(--muted); font-size:.92em;}
button{font-family:inherit; color:inherit;}
/* ---------- Header ---------- */
header{
  position:fixed; top:0; left:0; right:0; height:var(--headh);
  padding-top:env(safe-area-inset-top);
  background:color-mix(in srgb, var(--bg) 88%, transparent);
  background:var(--bg);
  border-bottom:1px solid var(--line);
  display:flex; align-items:center; justify-content:space-between;
  padding-left:18px; padding-right:14px; z-index:50;
}
.brand{display:flex; align-items:baseline; gap:8px; min-width:150px;}
.brand .zh{font-size:24px; font-weight:700; color:var(--red);}
.brand .en{font-size:13px; font-weight:600; letter-spacing:.4px; color:var(--muted); text-transform:uppercase;}
#headTitle{font-weight:600; font-size:16px; flex:1; text-align:center; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
.headRight{display:flex; align-items:center; gap:6px; min-width:150px; justify-content:flex-end;}
.streakChip{display:flex; align-items:center; gap:4px; background:var(--soft); border:1px solid var(--line);
  border-radius:999px; padding:6px 12px; font-weight:600; font-size:14px; color:var(--gold);}
.iconBtn{
  width:46px; height:46px; border-radius:14px; border:1px solid var(--line);
  background:var(--card); display:flex; align-items:center; justify-content:center;
  cursor:pointer; box-shadow:var(--shadow);
}
.iconBtn:active{transform:scale(.94);}
.iconBtn svg{width:22px;height:22px;color:var(--ink);}
.backBtn{border:none; background:transparent; box-shadow:none; width:42px;}
.backBtn svg{color:var(--red); width:26px; height:26px;}
/* ---------- Screen container ---------- */
#screen{
  padding:calc(var(--headh) + env(safe-area-inset-top) + 16px) 20px calc(var(--tabh) + env(safe-area-inset-bottom) + 24px);
  max-width:980px; margin:0 auto;
  animation:fadeIn .2s ease;
}
@keyframes fadeIn{from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:none;}}
/* ---------- Tab bar ---------- */
nav#tabbar{
  position:fixed; left:0; right:0; bottom:0; z-index:50;
  height:calc(var(--tabh) + env(safe-area-inset-bottom));
  padding-bottom:env(safe-area-inset-bottom);
  background:var(--card); border-top:1px solid var(--line);
  display:flex; align-items:stretch; justify-content:space-around;
}
nav#tabbar button{
  flex:1; max-width:130px; border:none; background:none; cursor:pointer;
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px;
  color:var(--muted); font-size:11px; font-weight:500; padding:6px 0 8px;
}
nav#tabbar button svg{width:23px; height:23px;}
nav#tabbar button.active{color:var(--red);}
nav#tabbar button.active svg{color:var(--red);}
/* ---------- Cards & layout ---------- */
.card{background:var(--card); border:1px solid var(--line); border-radius:var(--rad);
  box-shadow:var(--shadow); padding:20px;}
.cardTight{padding:14px 16px;}
h1{font-size:26px; font-weight:600; margin:6px 0 4px;}
h2{font-size:19px; font-weight:600; margin:0 0 10px;}
h3{font-size:16px; font-weight:600; margin:0 0 6px;}
.sub{color:var(--muted); font-size:14px; margin:0 0 16px;}
.grid2{display:grid; grid-template-columns:repeat(auto-fill,minmax(290px,1fr)); gap:14px;}
.grid3{display:grid; grid-template-columns:repeat(auto-fill,minmax(210px,1fr)); gap:14px;}
.row{display:flex; align-items:center; gap:10px;}
.spread{display:flex; align-items:center; justify-content:space-between; gap:10px;}
.wrap{flex-wrap:wrap;}
.mt{margin-top:16px;} .mtL{margin-top:26px;} .mb{margin-bottom:16px;}
.dim{color:var(--muted);} .small{font-size:13px;} .tiny{font-size:12px;}
.gold{color:var(--gold);} .redTx{color:var(--red);} .okTx{color:var(--ok);}
.chip{display:inline-flex; align-items:center; gap:5px; padding:6px 12px; border-radius:999px;
  background:var(--soft); border:1px solid var(--line); font-size:13px; font-weight:500; color:var(--ink);}
.chip.gold{color:var(--gold);} .chip.red{background:var(--red); color:#fff; border-color:var(--red);}
.estimate{display:inline-flex; align-items:center; gap:5px; font-size:12.5px; color:var(--muted); font-weight:500;}
.estimate svg{width:14px; height:14px;}
.divider{height:1px; background:var(--line); margin:14px 0;}
/* ---------- Buttons ---------- */
.btn{
  display:inline-flex; align-items:center; justify-content:center; gap:8px;
  min-height:50px; padding:12px 22px; border-radius:14px; border:1px solid var(--line);
  background:var(--card); font-size:15.5px; font-weight:600; cursor:pointer;
  box-shadow:var(--shadow); transition:transform .12s ease, background .15s;
}
.btn:active{transform:scale(.96);}
.btn.primary{background:var(--red); color:#fff; border-color:var(--red);}
.btn.gold{background:var(--gold); color:#fff; border-color:var(--gold);}
.btn.ghost{background:transparent; box-shadow:none;}
.btn.block{width:100%;}
.btn.sm{min-height:42px; padding:8px 16px; font-size:14px; border-radius:12px;}
.btn:disabled{opacity:.45; pointer-events:none;}
.btn svg{width:18px; height:18px;}
/* ---------- Module grid (home) ---------- */
.modCard{display:flex; flex-direction:column; gap:8px; padding:18px; border-radius:var(--rad);
  background:var(--card); border:1px solid var(--line); box-shadow:var(--shadow); cursor:pointer;
  transition:transform .15s ease;}
.modCard:active{transform:scale(.97);}
.modIcon{width:46px; height:46px; border-radius:13px; display:flex; align-items:center; justify-content:center;
  background:var(--soft); color:var(--red);}
.modIcon svg{width:23px; height:23px;}
.modCard h3{margin:2px 0 0;}
.modCard p{margin:0; font-size:13px; color:var(--muted); line-height:1.45;}
/* ---------- Tone contours ---------- */
.tcurve{display:inline-block; vertical-align:middle;}
.tcurve path{stroke:var(--red); stroke-width:2.6; fill:none; stroke-linecap:round;}
.tcurve circle{fill:var(--red);}
.toneRow{display:inline-flex; gap:3px; align-items:center;}
/* ---------- Vocabulary ---------- */
.catBar{display:flex; gap:8px; overflow-x:auto; padding:4px 2px 10px; -webkit-overflow-scrolling:touch; scrollbar-width:none;}
.catBar::-webkit-scrollbar{display:none;}
.catChip{white-space:nowrap; padding:9px 16px; border-radius:999px; border:1px solid var(--line);
  background:var(--card); font-size:14px; font-weight:500; cursor:pointer; color:var(--ink);}
.catChip.active{background:var(--ink); color:var(--bg); border-color:var(--ink);}
body.dark .catChip.active{background:var(--gold); color:#1C1C1E; border-color:var(--gold);}
.vocRow{display:flex; align-items:center; gap:14px; padding:13px 16px; background:var(--card);
  border:1px solid var(--line); border-radius:var(--radS); box-shadow:var(--shadow); cursor:pointer;}
.vocRow .zh{font-size:30px; font-weight:700; min-width:74px;}
.vocMain{flex:1; min-width:0;}
.vocEx{margin-top:10px; padding:12px 14px; background:var(--soft); border-radius:10px; font-size:14.5px; line-height:1.7;}
.searchBox{width:100%; min-height:48px; padding:12px 16px; border-radius:13px; border:1px solid var(--line);
  background:var(--card); font-size:15px; color:var(--ink); outline:none; font-family:inherit;}
.searchBox:focus{border-color:var(--gold);}
/* ---------- Flashcards ---------- */
.flipWrap{perspective:1400px; max-width:560px; margin:0 auto;}
.flipCard{position:relative; width:100%; min-height:330px; transform-style:preserve-3d;
  transition:transform var(--flip) cubic-bezier(.4,.1,.2,1); cursor:pointer;}
.flipCard.flipped{transform:rotateY(180deg);}
.face{position:absolute; inset:0; backface-visibility:hidden; -webkit-backface-visibility:hidden;
  background:var(--card); border:1px solid var(--line); border-radius:22px; box-shadow:var(--shadow-lg);
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px; padding:26px; text-align:center;}
.face.back{transform:rotateY(180deg);}
.face .bigzh{font-size:84px; font-weight:700; line-height:1.15;}
.face .bigen{font-size:30px; font-weight:600;}
.rateRow{display:grid; grid-template-columns:repeat(4,1fr); gap:10px; max-width:560px; margin:18px auto 0;}
.rateBtn{display:flex; flex-direction:column; gap:2px; min-height:62px; border-radius:14px; border:1px solid var(--line);
  background:var(--card); font-weight:600; font-size:15px; cursor:pointer; box-shadow:var(--shadow); align-items:center; justify-content:center;}
.rateBtn span.iv{font-size:11.5px; font-weight:500; color:var(--muted);}
.rateBtn.again{color:var(--bad);} .rateBtn.hard{color:#B8860B;} .rateBtn.good{color:var(--ok);} .rateBtn.easy{color:#2563A8;}
.rateBtn:active{transform:scale(.95);}
.progressBar{height:7px; border-radius:99px; background:var(--soft); overflow:hidden; flex:1;}
.progressBar > div{height:100%; background:var(--red); border-radius:99px; transition:width .3s ease;}
/* ---------- Quiz ---------- */
.quizOpt{width:100%; min-height:60px; padding:14px 18px; border-radius:14px; border:1.5px solid var(--line);
  background:var(--card); font-size:17px; font-weight:500; cursor:pointer; box-shadow:var(--shadow);
  display:flex; align-items:center; justify-content:center; gap:10px; text-align:center;}
.quizOpt .zh{font-size:26px; font-weight:700;}
.quizOpt:active{transform:scale(.97);}
.quizOpt.ok{animation:pulseOk .55s ease; border-color:var(--ok); background:var(--okbg);}
.quizOpt.bad{animation:shakeBad .45s ease; border-color:var(--bad); background:var(--badbg);}
.quizOpt.reveal{border-color:var(--ok); background:var(--okbg);}
@keyframes pulseOk{0%{box-shadow:0 0 0 0 rgba(46,139,87,.45);} 70%{box-shadow:0 0 0 16px rgba(46,139,87,0);} 100%{box-shadow:0 0 0 0 rgba(46,139,87,0);}}
@keyframes shakeBad{0%,100%{transform:translateX(0);} 20%{transform:translateX(-9px);} 40%{transform:translateX(8px);} 60%{transform:translateX(-6px);} 80%{transform:translateX(4px);}}
.toneBtn{display:flex; flex-direction:column; align-items:center; gap:6px; min-height:88px; padding:12px 8px;
  border-radius:16px; border:1.5px solid var(--line); background:var(--card); cursor:pointer; box-shadow:var(--shadow);
  font-weight:600; font-size:14px;}
.toneBtn:active{transform:scale(.95);}
.toneBtn.ok{animation:pulseOk .55s ease; border-color:var(--ok); background:var(--okbg);}
.toneBtn.bad{animation:shakeBad .45s ease; border-color:var(--bad); background:var(--badbg);}
.toneBtn.reveal{border-color:var(--ok); background:var(--okbg);}
.toneGrid{display:grid; grid-template-columns:repeat(5,1fr); gap:10px;}
@media (max-width:560px){.toneGrid{grid-template-columns:repeat(3,1fr);} .rateRow{grid-template-columns:repeat(2,1fr);}}
.pinKey{min-width:52px; min-height:52px; border-radius:12px; border:1px solid var(--line); background:var(--card);
  font-size:18px; font-weight:600; cursor:pointer; box-shadow:var(--shadow); display:flex; flex-direction:column; align-items:center; justify-content:center;}
.pinKey small{font-size:10px; color:var(--muted); font-weight:500;}
.pinKey:active{transform:scale(.93); background:var(--soft);}
.bigInput{width:100%; min-height:58px; padding:14px 18px; font-size:22px; border-radius:14px;
  border:1.5px solid var(--line); background:var(--card); color:var(--ink); outline:none; text-align:center; font-family:'Inter',sans-serif;}
.bigInput:focus{border-color:var(--gold);}
.bigInput.ok{animation:pulseOk .55s ease; border-color:var(--ok); background:var(--okbg);}
.bigInput.bad{animation:shakeBad .45s ease; border-color:var(--bad); background:var(--badbg);}
/* ---------- Characters ---------- */
.charGrid{display:grid; grid-template-columns:repeat(auto-fill,minmax(86px,1fr)); gap:10px;}
.charTile{position:relative; aspect-ratio:1; border-radius:14px; border:1px solid var(--line); background:var(--card);
  box-shadow:var(--shadow); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:1px; cursor:pointer;}
.charTile .zh{font-size:33px; font-weight:700;}
.charTile .py{font-size:11px;}
.charTile.done{border-color:var(--gold); background:linear-gradient(180deg, var(--card), var(--soft));}
.charTile .dot{position:absolute; top:7px; right:7px; width:9px; height:9px; border-radius:99px; background:var(--gold);}
.charTile .gdot{position:absolute; top:7px; left:7px; width:9px; height:9px; border-radius:99px; background:var(--ok); opacity:.8;}
.canvasWrap{position:relative; width:min(440px, 92vw); margin:0 auto;}
canvas#strokeCv{width:100%; aspect-ratio:1; display:block; border-radius:20px; border:1.5px solid var(--line);
  background:var(--card); box-shadow:var(--shadow-lg); touch-action:none;}
.cvCaption{text-align:center; min-height:24px; font-size:14px; color:var(--muted); margin-top:10px; font-weight:500;}
.badge{display:inline-flex; align-items:center; gap:5px; font-size:12px; font-weight:600; padding:5px 11px; border-radius:99px;}
.badge.guided{background:var(--okbg); color:var(--ok);}
.badge.trace{background:var(--soft); color:var(--muted);}
/* ---------- Phrases ---------- */
.phraseLine{padding:15px 16px; background:var(--card); border:1px solid var(--line); border-radius:var(--radS); box-shadow:var(--shadow);}
.phraseLine .zhline{font-size:23px; font-weight:700; line-height:1.7;}
.tok{display:inline-block; padding:1px 3px; border-radius:7px; cursor:pointer;}
.tok.on{background:var(--soft); outline:1.5px dashed var(--gold);}
.tok.sel{background:var(--gold); color:#fff;}
.tokInfo{margin-top:10px; padding:11px 14px; background:var(--soft); border-radius:10px; font-size:15px;}
/* ---------- Media ---------- */
.lvTabs{display:flex; gap:8px; flex-wrap:wrap; margin-bottom:14px;}
.mediaCard{position:relative; padding:16px; border-radius:var(--rad); background:var(--card); border:1px solid var(--line); box-shadow:var(--shadow);}
.mediaCard.locked{opacity:.62;}
.mediaCard .why{margin:8px 0 0; font-size:13.5px; color:var(--muted); line-height:1.5;}
.lockTag{position:absolute; top:13px; right:13px; display:flex; align-items:center; gap:4px; font-size:11.5px; font-weight:600;
  color:var(--muted); background:var(--soft); padding:4px 9px; border-radius:99px;}
.typeTag{display:inline-flex; align-items:center; gap:5px; font-size:11.5px; font-weight:600; text-transform:uppercase;
  letter-spacing:.5px; color:var(--gold); margin-bottom:5px;}
/* ---------- Path ---------- */
.stage{display:flex; gap:15px; position:relative; padding-bottom:24px;}
.stage:before{content:""; position:absolute; left:23px; top:50px; bottom:-2px; width:2px; background:var(--line);}
.stage:last-child:before{display:none;}
.stageNum{flex:none; width:47px; height:47px; border-radius:99px; display:flex; align-items:center; justify-content:center;
  font-weight:700; font-size:17px; background:var(--soft); border:2px solid var(--line); color:var(--muted); z-index:1;}
.stage.done .stageNum{background:var(--gold); border-color:var(--gold); color:#fff;}
.stage.current .stageNum{background:var(--red); border-color:var(--red); color:#fff;}
.stage .card{flex:1;}
.stage.current .card{border-color:var(--red); box-shadow:0 0 0 1.5px var(--red), var(--shadow-lg);}
.stage.locked{opacity:.65;}
/* ---------- Progress ---------- */
.statGrid{display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:12px;}
.statCard{padding:16px; border-radius:var(--rad); background:var(--card); border:1px solid var(--line); box-shadow:var(--shadow); text-align:center;}
.statCard .num{font-size:32px; font-weight:700; color:var(--red);}
.statCard .lbl{font-size:12.5px; color:var(--muted); font-weight:500; margin-top:2px;}
.weekChart{display:flex; align-items:flex-end; gap:9px; height:150px; padding:6px 4px 0;}
.weekCol{flex:1; display:flex; flex-direction:column; align-items:center; gap:6px; height:100%; justify-content:flex-end;}
.weekBar{width:100%; max-width:42px; border-radius:8px 8px 4px 4px; background:linear-gradient(180deg,var(--red),#A93226); min-height:4px; transition:height .4s ease;}
.weekCol .d{font-size:11.5px; color:var(--muted); font-weight:500;}
/* ---------- Settings ---------- */
.setRow{display:flex; align-items:center; justify-content:space-between; gap:12px; padding:15px 2px; border-bottom:1px solid var(--line);}
.setRow:last-child{border-bottom:none;}
.toggle{position:relative; width:56px; height:33px; border-radius:99px; background:var(--line); border:none; cursor:pointer; transition:background .2s; flex:none;}
.toggle:after{content:""; position:absolute; top:3px; left:3px; width:27px; height:27px; border-radius:99px; background:#fff; box-shadow:0 1px 4px rgba(0,0,0,.25); transition:left .2s;}
.toggle.on{background:var(--ok);}
.toggle.on:after{left:26px;}
.segWrap{display:flex; gap:6px; background:var(--soft); border:1px solid var(--line); padding:4px; border-radius:12px;}
.seg{min-height:40px; padding:6px 14px; border:none; border-radius:9px; background:transparent; font-weight:600; font-size:14px; cursor:pointer; color:var(--muted);}
.seg.active{background:var(--card); color:var(--ink); box-shadow:var(--shadow);}
/* misc */
.tipCard{background:linear-gradient(135deg, rgba(201,162,39,.10), rgba(192,57,43,.07)); border:1px solid var(--line);
  border-radius:var(--rad); padding:16px 18px;}
.bigGlyph{font-size:54px; line-height:1;}
.center{text-align:center;}
.fadeUp{animation:fadeIn .25s ease;}
.kbdRow{display:flex; gap:8px; flex-wrap:wrap; justify-content:center;}
.noselect{user-select:none; -webkit-user-select:none;}
@media (min-width:760px){
  .face .bigzh{font-size:96px;}
  #screen{padding-left:28px; padding-right:28px;}
}
</style>
</head>
<body>
<header>
  <div class="brand">
    <button class="iconBtn backBtn" id="backBtn" style="display:none" aria-label="Back"><i data-lucide="chevron-left"></i></button>
    <span class="zh noselect">墨语</span><span class="en">Ink Mandarin</span>
  </div>
  <div id="headTitle"></div>
  <div class="headRight">
    <span class="streakChip" id="streakChip" title="Daily streak"><i data-lucide="flame" style="width:16px;height:16px"></i><span id="streakNum">0</span></span>
    <button class="iconBtn" id="settingsBtn" aria-label="Settings"><i data-lucide="settings"></i></button>
  </div>
</header>

<main id="screen"></main>

<nav id="tabbar">
  <button data-tab="home"><i data-lucide="home"></i><span>Home</span></button>
  <button data-tab="flashcards"><i data-lucide="layers"></i><span>Cards</span></button>
  <button data-tab="quiz"><i data-lucide="list-checks"></i><span>Quiz</span></button>
  <button data-tab="characters"><i data-lucide="pen-tool"></i><span>Characters</span></button>
  <button data-tab="media"><i data-lucide="tv"></i><span>Media</span></button>
  <button data-tab="progress"><i data-lucide="trending-up"></i><span>Progress</span></button>
</nav>

<noscript><div style="padding:120px 30px;text-align:center;font-family:sans-serif">Ink Mandarin needs JavaScript enabled to run.</div></noscript>

<script id="app-js">
(function(){
'use strict';
var IS_BROWSER = (typeof window !== 'undefined') && (typeof document !== 'undefined');

/* ============================================================

var TONED = {
  'ā':['a','1'],'á':['a','2'],'ǎ':['a','3'],'à':['a','4'],
  'ē':['e','1'],'é':['e','2'],'ě':['e','3'],'è':['e','4'],
  'ī':['i','1'],'í':['i','2'],'ǐ':['i','3'],'ì':['i','4'],

function syllToNum(s){
  var tone = '5', base = '';
  var chars = Array.from(String(s).toLowerCase());
  for (var k = 0; k < chars.length; k++){
    var m = TONED[chars[k]];
    if (m){ base += m[0]; if (m[1] !== '0') tone = m[1]; }
    else base += chars[k];
  }
  return base + tone;
}
function wordToNum(p){
  return String(p).toLowerCase().trim().split(/\s+/).filter(Boolean).map(syllToNum).join(' ');
}
function tonesOf(p){
  return String(p).trim().split(/\s+/).filter(Boolean)
    .map(function(s){ return syllToNum(s).slice(-1); }).join('-');
}
function syllBaseOnly(s){ return syllToNum(s).replace(/[1-5]$/, ''); }
/* place a tone mark on a bare syllable (a > e > ou > last of i,u,v) */
function applyToneMark(base, tone){
  base = String(base).toLowerCase().replace(/ü/g, 'v');
  if (tone === 5 || tone === '5') return base.replace(/v/g, 'ü');
  var t = (+tone) - 1, idx = -1;
  if (base.indexOf('a') > -1) idx = base.indexOf('a');
  else if (base.indexOf('e') > -1) idx = base.indexOf('e');
  else if (base.indexOf('ou') > -1) idx = base.indexOf('o');
  else { for (var k = base.length - 1; k >= 0; k--){ if ('iouv'.indexOf(base[k]) > -1){ idx = k; break; } } }
  if (idx < 0) return base.replace(/v/g, 'ü');
  var ch = base[idx], marked = MARKS[ch] ? MARKS[ch][t] : ch;
  return (base.slice(0, idx) + marked + base.slice(idx + 1)).replace(/v/g, 'ü');
}
/* normalize any user pinyin answer to canonical 'ni3 hao3' form */
function normPinyinInput(raw){
  var s = String(raw || '').toLowerCase().trim()
    .replace(/ü/g, 'v').replace(/[''’\-·.]/g, ' ')
    .replace(/([1-5])(?=[a-z])/g, '$1 ')
    .replace(/\s+/g, ' ').trim();
  if (!s) return '';
  return s.split(' ').map(function(tok){
    if (/[1-5]$/.test(tok)){
      var b = '';
      var arr = Array.from(tok);
      for (var k = 0; k < arr.length; k++){ var m = TONED[arr[k]]; b += m ? m[0] : arr[k]; }
      return b;
    }
    return syllToNum(tok);
  }).join(' ');
}

  d = d || new Date();

function addDaysStr(n){ var d = new Date(); d.setDate(d.getDate() + n); return todayStr(d); }
function dayDiff(aStr, bStr){
  var a = new Date(aStr + 'T00:00:00'), b = new Date(bStr + 'T00:00:00');

}
function shuffle(arr){
  var a = arr.slice();
  for (var i = a.length - 1; i > 0; i--){ var j = Math.floor(Math.random() * (i + 1)); var t = a[i]; a[i] = a[j]; a[j] = t; }
  return a;
}

/* ============================================================
   STATE — localStorage-backed, Safari-private-mode safe
   ============================================================ */
var STORE_KEY = 'inkmandarin_v1';
var DEFAULT_DB = {
  settings: { pinyin:true, english:true, dark:false, flip:'normal', goal:20, front:'character' },
  srs: {},
  stats: { quiz:[], tone:{ok:0,total:0,streak:0,best:0}, chars:{}, phrases:{},
           activity:{}, streak:0, lastActive:null, newToday:{date:null,count:0} }
};
function deepMerge(base, over){
  var out = JSON.parse(JSON.stringify(base));
  if (!over || typeof over !== 'object') return out;
  Object.keys(over).forEach(function(k){
    if (out[k] && typeof out[k] === 'object' && !Array.isArray(out[k]) && over[k] && typeof over[k] === 'object' && !Array.isArray(over[k])){
      out[k] = deepMerge(out[k], over[k]);
    } else out[k] = over[k];
  });
  return out;
}
function freshDB(){ return JSON.parse(JSON.stringify(DEFAULT_DB)); }
function hasWS(){ try{ return typeof window !== 'undefined' && window.storage && typeof window.storage.get === 'function'; }catch(e){ return false; } }
function fromLocal(){
  try{
    if (typeof localStorage !== 'undefined'){
      var raw = localStorage.getItem(STORE_KEY);
      if (raw) return deepMerge(DEFAULT_DB, JSON.parse(raw));
    }
  }catch(e){}
  return null;
}
function loadDB(){
  return new Promise(function(res){
    if (!hasWS()){ res(fromLocal() || freshDB()); return; }
    var settled = false;
    function done(db){ if (!settled){ settled = true; res(db); } }
    try{
      window.storage.get(STORE_KEY).then(function(r){
        var out = null;
        try{ if (r && r.value) out = deepMerge(DEFAULT_DB, JSON.parse(r.value)); }catch(e){}
        done(out || fromLocal() || freshDB());
      }).catch(function(){ done(fromLocal() || freshDB()); });
    }catch(e){ done(fromLocal() || freshDB()); }
    setTimeout(function(){ done(fromLocal() || freshDB()); }, 2500);
  });
}
var DB = freshDB();
var saveT = null;
function save(){
  try{ if (typeof localStorage !== 'undefined') localStorage.setItem(STORE_KEY, JSON.stringify(DB)); }catch(e){}
  if (hasWS()){
    if (saveT) clearTimeout(saveT);
    saveT = setTimeout(function(){
      try{
        var p = window.storage.set(STORE_KEY, JSON.stringify(DB));
        if (p && p.catch) p.catch(function(){});
      }catch(e){}
    }, 400);
  }
}
function logAct(n){
  var t = todayStr(), st = DB.stats;
  st.activity[t] = (st.activity[t] || 0) + (n || 1);
  if (st.lastActive !== t){
    if (st.lastActive && dayDiff(st.lastActive, t) === 1) st.streak = (st.streak || 0) + 1;
    else st.streak = 1;
    st.lastActive = t;
    if (IS_BROWSER){ var el = document.getElementById('streakNum'); if (el) el.textContent = st.streak; }
  }
  save();
}

/* ============================================================
   SRS — simplified SM-2 (Again / Hard / Good / Easy)
   ============================================================ */
function cardId(i){ return 'w' + i; }
function srsRate(id, r){
  var c = DB.srs[id] || { ef:2.5, iv:0, reps:0, due:todayStr() };
  if (r === 0){ c.reps = 0; c.iv = 0; c.ef = Math.max(1.3, c.ef - 0.2); c.due = todayStr(); }
  else if (r === 1){ c.iv = c.reps === 0 ? 1 : Math.max(1, Math.round(c.iv * 1.2)); c.ef = Math.max(1.3, c.ef - 0.15); c.reps++; c.due = addDaysStr(c.iv); }
  else if (r === 2){ c.iv = c.reps === 0 ? 1 : (c.reps === 1 ? 6 : Math.round(c.iv * c.ef)); c.reps++; c.due = addDaysStr(c.iv); }
  else { c.iv = c.reps === 0 ? 3 : Math.max(2, Math.round(c.iv * c.ef * 1.3)); c.ef += 0.15; c.reps++; c.due = addDaysStr(c.iv); }
  DB.srs[id] = c; logAct(1);
}
function previewIv(id, r){
  var c = DB.srs[id] || { ef:2.5, iv:0, reps:0 };
  if (r === 0) return '< 10 min';
  if (r === 1) return (c.reps === 0 ? 1 : Math.max(1, Math.round(c.iv * 1.2))) + 'd';
  if (r === 2) return (c.reps === 0 ? 1 : (c.reps === 1 ? 6 : Math.round(c.iv * c.ef))) + 'd';
  return (c.reps === 0 ? 3 : Math.max(2, Math.round(c.iv * c.ef * 1.3))) + 'd';
}
function learnedCount(){
  var n = 0; Object.keys(DB.srs).forEach(function(k){ if (DB.srs[k].iv >= 1) n++; }); return n;
}
function dueIds(){
  var t = todayStr(), out = [];
  Object.keys(DB.srs).forEach(function(k){ if (DB.srs[k].due <= t) out.push(k); });
  return out;
}
function newBudget(){
  var nt = DB.stats.newToday;
  if (nt.date !== todayStr()){ nt.date = todayStr(); nt.count = 0; }
  return Math.max(0, DB.settings.goal - nt.count);
}
function newIds(limit){
  var out = [];
  for (var i = 0; i < VOCAB.length && out.length < limit; i++){
    if (!DB.srs[cardId(i)]) out.push(cardId(i));
  }
  return out;
}
function buildSession(){
  var due = dueIds();
  var fresh = newIds(newBudget());
  return due.concat(fresh);
}
function quizAcc(){
  var q = DB.stats.quiz, c = 0, t = 0;
  q.forEach(function(r){ c += r.correct; t += r.total; });
  return t ? Math.round(100 * c / t) : null;
}
function toneAcc(){
  var t = DB.stats.tone;
  return t.total ? Math.round(100 * t.ok / t.total) : null;
}
function charsDone(){
  var n = 0; Object.keys(DB.stats.chars).forEach(function(k){ if (DB.stats.chars[k]) n++; }); return n;
}
function phrasesSeen(){ return Object.keys(DB.stats.phrases).length; }
function levelInfo(){
  var n = learnedCount(), acc = quizAcc() == null ? 100 : quizAcc();
  if (n < 60)  return { name:'Beginner', cefr:'A1' };
  if (n < 150) return { name:'Elementary', cefr:'A2' };
  if (n < 280) return { name:'Pre-intermediate', cefr:'B1' };
  return acc >= 70 ? { name:'Intermediate', cefr:'B2' } : { name:'Pre-intermediate', cefr:'B1' };
}
function pathStatus(){
  var checks = [
    DB.stats.tone.total >= 50 && (toneAcc() || 0) >= 80,
    charsDone() >= 100,
    phrasesSeen() >= 25,
    learnedCount() >= 150,
    learnedCount() >= 300,
    learnedCount() >= VOCAB.length,
    false, false
  ];
  var current = checks.indexOf(false);
  if (current === -1) current = PATH.length - 1;
  return { checks: checks, current: current };
}

function icons(){
  var els = document.querySelectorAll('i[data-lucide]');
  for (var k = 0; k < els.length; k++){
    var el = els[k], name = el.getAttribute('data-lucide'), svg = ICONS[name];
    if (!svg) continue;
    var box = document.createElement('span');
    box.innerHTML = svg;
    var node = box.firstChild;
    if (el.getAttribute('style')) node.setAttribute('style', el.getAttribute('style'));
    if (el.getAttribute('class')) node.setAttribute('class', el.getAttribute('class'));
    el.parentNode.replaceChild(node, el);
  }
}
function go(name){
  clearTimers();
  cur = name;
  render();
}
function render(){
  var s = document.getElementById('screen');
  SCREENS[cur](s);
  document.getElementById('headTitle').textContent = TITLES[cur] || '';
  document.getElementById('backBtn').style.display = TABS.indexOf(cur) > -1 ? 'none' : 'flex';
  var btns = document.querySelectorAll('#tabbar button');
  for (var i = 0; i < btns.length; i++) btns[i].classList.toggle('active', btns[i].getAttribute('data-tab') === cur);
  document.getElementById('streakNum').textContent = DB.stats.streak || 0;
  window.scrollTo(0, 0);
  icons();
}

/* ============================================================
   SHARED RENDER HELPERS
   ============================================================ */
function estimateChip(mins){
  return '<span class="estimate"><i data-lucide="clock"></i>~' + mins + ' min session</span>';
}
function pyHTML(v, w){
  return '<span class="py">' + esc(v.pinyin) + '</span> ' + toneRowFor(v.pinyin, w || 20);
}
var TIPS = [
'Tones first: a wrong tone is a different word, not an accent. Two minutes of tone training beats twenty minutes of vocabulary.',
'Comprehensible input: understanding messages you ALMOST get is how children learn. Keep it 90% understandable.',
'No Chinese environment? Build one: dubbed films, learner podcasts, HelloTalk. Your phone is an immersion machine.',
'Frequency first: every word in this app earned its place by how often people actually say it.',
'Micro-sessions beat marathons: ten focused minutes every day rewires more than two hours on Sunday.',
'Adult advantage: you can spot patterns. 火车 = fire + vehicle = train. Logic is your superpower.',
'Write by hand: tracing characters builds memory that typing never will.'
];

function homeScreen(s){
  var h = new Date().getHours();
  var greet = h < 12 ? '早上好' : (h < 18 ? '下午好' : '晚上好');
  var greetEn = h < 12 ? 'Good morning' : (h < 18 ? 'Good afternoon' : 'Good evening');
  var due = dueIds().length, fresh = Math.min(newBudget(), VOCAB.length - Object.keys(DB.srs).length);
  var lv = levelInfo();
  var tip = TIPS[Math.floor(Date.now() / 86400000) % TIPS.length];
  var doneToday = DB.stats.activity[todayStr()] || 0;
  var goalPct = clamp(Math.round(100 * doneToday / (DB.settings.goal * 2)), 0, 100);
  s.innerHTML = '<div class="fadeUp">' +
  '<h1><span class="zh redTx">' + greet + '</span> · ' + greetEn + '</h1>' +
  '<p class="sub">Level: <b>' + lv.name + ' (' + lv.cefr + ')</b> · ' + learnedCount() + ' words learned</p>' +

  '<div class="card spread wrap">' +
    '<div><h2 style="margin:0">Today\u2019s review</h2>' +
    '<p class="sub" style="margin:4px 0 0">' + due + ' due · ' + fresh + ' new cards waiting ' + estimateChip(Math.max(3, Math.round((due + fresh) * 0.4))) + '</p></div>' +
    '<button class="btn primary" data-act="startCards"><i data-lucide="play"></i>Start review</button>' +
  '</div>' +

  '<div class="card mt">' +
    '<div class="spread"><h3 style="margin:0">Daily goal</h3><span class="small dim">' + doneToday + ' actions today</span></div>' +
    '<div class="row mt" style="gap:12px"><div class="progressBar"><div style="width:' + goalPct + '%"></div></div><span class="small dim">' + goalPct + '%</span></div>' +
  '</div>' +

  '<h2 class="mtL">Modules</h2>' +
  '<div class="grid3">' +
    modCard('tones', 'activity', 'Tone Trainer', 'The non-negotiable first skill. Pitch curves + minimal pairs.', 3) +
    modCard('vocab', 'book-open', 'Vocabulary', VOCAB.length + ' frequency-first words in 12 themes.', 5) +
    modCard('phrases', 'message-circle', 'Phrases', 'Real dialogues with tap-to-break-down words.', 4) +
    modCard('characters', 'pen-tool', 'Characters', 'Stroke order for the 150 essential characters.', 5) +
    modCard('quiz', 'list-checks', 'Quiz', 'Four modes with instant feedback.', 4) +
    modCard('path', 'map', 'Learning Path', 'Your 8-stage roadmap — see where you are.', 2) +
  '</div>' +

  '<div class="tipCard mtL"><b class="gold">Why this works</b><p style="margin:6px 0 0;font-size:14.5px">' + tip + '</p></div>' +

  '<div class="card mt spread wrap">' +
    '<div><h3 style="margin:0">Immersion picks for ' + lv.cefr + '</h3><p class="sub" style="margin:4px 0 0">Shows, books and podcasts matched to your level.</p></div>' +
    '<button class="btn" data-act="goMedia"><i data-lucide="tv"></i>Open library</button>' +
  '</div>' +
  '</div>';
}
function modCard(target, icon, title, desc, mins){
  return '<div class="modCard" data-act="go" data-go="' + target + '">' +
    '<div class="modIcon"><i data-lucide="' + icon + '"></i></div>' +
    '<h3>' + title + '</h3><p>' + desc + '</p>' + estimateChip(mins) + '</div>';
}

/* ============================================================
   SCREEN: VOCABULARY
   ============================================================ */
var VS = { cat:'all', q:'', open:-1 };
function vocabScreen(s){
  var list = VOCAB.map(function(v, i){ return { v:v, i:i }; }).filter(function(o){
    if (VS.cat !== 'all' && o.v.category !== VS.cat) return false;
    if (VS.q){
      var q = VS.q.toLowerCase();
      return o.v.character.indexOf(VS.q) > -1 || o.v.pinyin.toLowerCase().indexOf(q) > -1 ||
             syllBaseList(o.v.pinyin).indexOf(q.replace(/\s+/g,'')) > -1 || o.v.english.toLowerCase().indexOf(q) > -1;
    }
    return true;
  });
  var chips = '<button class="catChip' + (VS.cat === 'all' ? ' active' : '') + '" data-act="vocCat" data-cat="all">All · ' + VOCAB.length + '</button>' +
    CATS.map(function(c){
      var n = VOCAB.filter(function(v){ return v.category === c[0]; }).length;
      return '<button class="catChip' + (VS.cat === c[0] ? ' active' : '') + '" data-act="vocCat" data-cat="' + c[0] + '">' + c[1] + ' · ' + n + '</button>';
    }).join('');
  s.innerHTML = '<div class="fadeUp">' +
  '<p class="sub">Every word shows its <b>tone contour</b> — the pitch shape is part of the word. ' + estimateChip(5) + '</p>' +
  '<input class="searchBox" id="vocSearch" placeholder="Search hanzi, pinyin or English…" value="' + esc(VS.q) + '">' +
  '<div class="catBar mt">' + chips + '</div>' +
  '<div style="display:flex;flex-direction:column;gap:10px">' +
  list.map(function(o){
    var v = o.v, open = VS.open === o.i;
    var lr = DB.srs[cardId(o.i)] && DB.srs[cardId(o.i)].iv >= 1;
    return '<div class="vocRow" data-act="vocOpen" data-i="' + o.i + '">' +
      '<span class="zh">' + v.character + '</span>' +
      '<div class="vocMain"><div>' + pyHTML(v) + (lr ? ' <span class="tiny gold">●</span>' : '') + '</div>' +
      '<div class="small dim">' + esc(v.english) + '</div>' +
      (open ? '<div class="vocEx"><span class="zh">' + esc(v.exampleChinese) + '</span><br><span class="small dim">' + esc(v.exampleEnglish) + '</span></div>' : '') +
      '</div><i data-lucide="' + (open ? 'chevron-up' : 'chevron-down') + '" style="color:var(--muted)"></i></div>';
  }).join('') +
  (list.length ? '' : '<p class="dim center mt">No words match.</p>') +
  '</div></div>';
  var inp = document.getElementById('vocSearch');
  inp.addEventListener('input', function(){ VS.q = inp.value; var keep = inp.selectionStart; render(); var n = document.getElementById('vocSearch'); n.focus(); try{ n.setSelectionRange(keep, keep); }catch(e){} });
}
function syllBaseList(p){ return wordToNum(p).replace(/[1-5]/g, '').replace(/\s+/g, ''); }

var FS = { stage:'setup', queue:[], idx:0, flipped:false, done:0, again:0, startN:0 };
function flashScreen(s){
  if (FS.stage === 'setup'){
    var due = dueIds().length, fresh = Math.min(newBudget(), VOCAB.length - Object.keys(DB.srs).length);
    var n = due + fresh;
    s.innerHTML = '<div class="fadeUp" style="max-width:640px;margin:0 auto">' +
    '<div class="card center">' +
      '<div class="bigGlyph zh redTx noselect">记</div>' +
      '<h2 class="mt">Spaced repetition</h2>' +
      '<p class="sub">Rate each card and the app schedules its return just before you would forget — the Anki SM-2 method.</p>' +
      '<div class="row wrap" style="justify-content:center;gap:8px">' +
        '<span class="chip">' + due + ' due</span><span class="chip">' + fresh + ' new</span>' + estimateChip(Math.max(2, Math.round(n * 0.4))) +
      '</div>' +
      '<div class="divider"></div>' +
      '<div class="spread wrap"><span class="small dim">Front of card</span><div class="segWrap">' +
        '<button class="seg' + (DB.settings.front === 'character' ? ' active' : '') + '" data-act="frontSet" data-v="character">汉字</button>' +
        '<button class="seg' + (DB.settings.front === 'english' ? ' active' : '') + '" data-act="frontSet" data-v="english">English</button>' +
      '</div></div>' +
      '<button class="btn primary block mt" data-act="flashStart"' + (n ? '' : ' disabled') + '><i data-lucide="play"></i>' + (n ? 'Start · ' + n + ' cards' : 'All done for today!') + '</button>' +
      (n ? '' : '<p class="small dim mt">Come back tomorrow, or raise your daily goal in Settings.</p>') +
    '</div></div>';
    return;
  }
  if (FS.stage === 'done' || FS.idx >= FS.queue.length){
    s.innerHTML = '<div class="fadeUp center" style="max-width:560px;margin:40px auto">' +
    '<div class="card"><div class="bigGlyph">🎉</div><h2 class="mt">Session complete</h2>' +
    '<p class="sub">' + FS.done + ' cards reviewed · ' + FS.again + ' marked “Again”.</p>' +
    '<p class="small dim">Learned so far: <b>' + learnedCount() + '</b> words. Streak: <b>' + (DB.stats.streak || 0) + ' 🔥</b></p>' +
    '<div class="row mt" style="justify-content:center;gap:10px">' +
    '<button class="btn" data-act="go" data-go="home">Home</button>' +
    '<button class="btn primary" data-act="go" data-go="quiz">Quiz me</button></div></div></div>';
    return;
  }
  var id = FS.queue[FS.idx], i = +id.slice(1), v = VOCAB[i];
  var isNew = !DB.srs[id];
  var frontIsChar = DB.settings.front === 'character';
  var front = frontIsChar
    ? '<div class="bigzh zh">' + v.character + '</div>' + (DB.settings.pinyin ? '<div>' + pyHTML(v, 24) + '</div>' : '')
    : '<div class="bigen">' + esc(v.english) + '</div><div class="small dim">' + esc(CATS.filter(function(c){return c[0]===v.category;})[0][1]) + '</div>';
  var back = '<div class="bigzh zh" style="font-size:64px">' + v.character + '</div>' +
    '<div>' + pyHTML(v, 24) + '</div>' +
    (DB.settings.english ? '<div style="font-size:21px;font-weight:600">' + esc(v.english) + '</div>' : '') +
    '<div class="vocEx" style="width:100%"><span class="zh">' + esc(v.exampleChinese) + '</span>' +
    (DB.settings.english ? '<br><span class="small dim">' + esc(v.exampleEnglish) + '</span>' : '') + '</div>';
  s.innerHTML = '<div class="fadeUp">' +
  '<div class="row mb" style="max-width:560px;margin:0 auto 14px;gap:12px">' +
    '<div class="progressBar"><div style="width:' + Math.round(100 * FS.idx / FS.queue.length) + '%"></div></div>' +
    '<span class="small dim" style="white-space:nowrap">' + (FS.idx + 1) + ' / ' + FS.queue.length + '</span>' +
    (isNew ? '<span class="chip gold">new</span>' : '') +
    '<button class="btn sm ghost" data-act="flashExit" aria-label="End session" style="padding:6px 12px">✕</button></div>' +
  '<div class="flipWrap"><div class="flipCard' + (FS.flipped ? ' flipped' : '') + '" data-act="flip">' +
    '<div class="face">' + front + '<span class="small dim" style="position:absolute;bottom:14px">tap to flip</span></div>' +
    '<div class="face back">' + back + '</div>' +
  '</div></div>' +
  (FS.flipped ?

function genQuiz(mode){
  var pool = VOCAB.map(function(v, i){ return { v:v, i:i }; });
  if (mode === 3) pool = pool.filter(function(o){ return o.v.pinyin.split(' ').length <= 3; });
  pool = shuffle(pool).slice(0, 10);
  return pool.map(function(o){
    var q = { v:o.v, i:o.i };
    if (mode === 1 || mode === 2){
      var sameCat = VOCAB.filter(function(w){ return w.category === o.v.category && w !== o.v; });
      var dis = shuffle(sameCat).slice(0, 3);
      while (dis.length < 3){ var r = pick(VOCAB); if (r !== o.v && dis.indexOf(r) === -1) dis.push(r); }
      q.opts = shuffle([o.v].concat(dis));
      q.ans = q.opts.indexOf(o.v);
    } else if (mode === 4){
      var sylls = o.v.pinyin.split(' ');
      var k = Math.floor(Math.random() * sylls.length);
      q.ch = Array.from(o.v.character)[k] || o.v.character;
      q.base = syllBaseOnly(sylls[k]).replace(/v/g, 'ü');

  });
}

/* --- geometry --- */
function resample(pts, n){

    segs.push(d); total += d;
  }
  if (total === 0) return pts.slice();
  var out = [pts[0]], step = total / (n - 1), dist = 0, target = step, i2 = 1;
  var a = pts[0];
  while (out.length < n - 1 && i2 < pts.length){
    var b = pts[i2], d2 = Math.hypot(b[0] - a[0], b[1] - a[1]);
    if (dist + d2 >= target){
      var k = (target - dist) / d2;

  var startD = Math.hypot(U[0][0] - T[0][0], U[0][1] - T[0][1]);

  if (all.length < 8){ cap('Trace the whole character first.'); return; }
  var on = 0;
  all.forEach(function(p){ if (maskAt(p[0], p[1]) || maskAt(p[0]+4, p[1]) || maskAt(p[0]-4, p[1]) || maskAt(p[0], p[1]+4) || maskAt(p[0], p[1]-4)) on++; });
  var onInk = on / all.length;
  var grid = {};
  all.forEach(function(p){ grid[(p[0] / 12 | 0) + '_' + (p[1] / 12 | 0)] = 1; });
  var tot = 0, hit = 0, step = 5;
  for (var y = 0; y < CV.size; y += step) for (var x2 = 0; x2 < CV.size; x2 += step){
    if (maskAt(x2, y)){
      tot++;
      var gx = x2 / 12 | 0, gy = y / 12 | 0, found = false;
      for (var a = -1; a <= 1 && !found; a++) for (var b = -1; b <= 1 && !found; b++) if (grid[(gx+a)+'_'+(gy+b)]) found = true;
      if (found) hit++;
    }
  }
  var cov = tot ? hit / tot : 0;
  if (onInk > 0.72 && cov > 0.5){
    DB.stats.chars[ch] = DB.stats.chars[ch] === 'mastered' ? 'mastered' : 'traced';
    logAct(2); save();
    cap('漂亮！Traced — ' + Math.round(onInk * 100) + '% on the ink. 🎉');
    later(render, 900);
  } else if (onInk <= 0.72){
    cap('Stay on the gray character — ' + Math.round(onInk * 100) + '% of your ink was on it. Try again.');
  } else {
    cap('Good aim, but cover more of the character (' + Math.round(cov * 100) + '% covered).');
  }
}

    TS.locked = true;
    var t = +el.getAttribute('data-t'), q = TS.q, correct = t === q.tone;
    var st = DB.stats.tone;
    st.total++;
    if (correct){ st.ok++; st.streak++; st.best = Math.max(st.best, st.streak); }
    else st.streak = 0;
    logAct(1);
    el.classList.add(correct ? 'ok' : 'bad');
    var btns = document.querySelectorAll('[data-act="toneAns"]');
    for (var i = 0; i < btns.length; i++) if (!correct && +btns[i].getAttribute('data-t') === q.tone) btns[i].classList.add('reveal');
    var fam = document.getElementById('toneFam');
    if (fam){
      var inner = '<div class="tokInfo">' + (correct ? '✓ ' : '✗ ') + '<b class="zh">' + q.ch + '</b> is <b>' +
        (q.tone === 5 ? q.base + ' (neutral)' : esc(applyToneMark(q.base.replace(/ü/g,'v'), q.tone))) + '</b> — ' + esc(q.en);
      if (q.fam){
        inner += '<div class="tiny dim" style="margin-top:6px">One sound, five words: ' + q.fam.items.map(function(it){
          return '<span class="zh">' + it[0] + '</span> ' + esc(it[1]) + ' <i>' + esc(it[2]) + '</i>';
        }).join(' · ') + '</div>';
      }
      fam.innerHTML = inner + '</div>';
    }
    later(function(){ TS.locked = false; TS.q = null; render(); }, 1300);
  },
  phCtx: function(el){ PS.ctx = el.getAttribute('data-id'); PS.sel = null; render(); },
  phBreak: function(){ PS.breakdown = !PS.breakdown; PS.sel = null; render(); },
  phTok: function(el){
    if (!PS.breakdown){ PS.breakdown = true; }
    var li = +el.getAttribute('data-li'), k = +el.getAttribute('data-k');
    PS.sel = (PS.sel && PS.sel[0] === li && PS.sel[1] === k) ? null : [li, k];
    DB.stats.phrases[PS.ctx + '_' + li] = 1;
    logAct(1); save(); render();
  },
  mediaLv: function(el){ MS.lv = el.getAttribute('data-lv'); render(); },
  setTog: function(el){
    var k = el.getAttribute('data-k');
    DB.settings[k] = !DB.settings[k];
    save(); applySettings(); render();
  },
  setSeg: function(el){
    var k = el.getAttribute('data-k'), v = el.getAttribute('data-v');
    DB.settings[k] = (k === 'goal') ? +v : v;
    save(); applySettings(); render();
  },
  resetAll: function(el){
    if (el.getAttribute('data-armed')){
      DB = freshDB();
      save(); applySettings(); go('home');
      return;
    }
    el.setAttribute('data-armed', '1');
    el.textContent = 'Tap again to erase everything';
    later(function(){
      el.removeAttribute('data-armed');
      el.innerHTML = '<i data-lucide="rotate-ccw"></i>Reset all progress';
      icons();
    }, 3000);
  }
};
function onTap(e){
  var t = e.target;
  if (!t || !t.closest) t = t && t.parentElement;
  var el = t && t.closest ? t.closest('[data-act]') : null;
  if (!el) return;
  var fn = ACTIONS[el.getAttribute('data-act')];
  if (fn){ e.preventDefault(); fn(el); }
}

/* ============================================================
   BOOT
   ============================================================ */
function boot(){
  document.getElementById('screen').innerHTML = '<div class="center" style="padding:120px 24px"><div class="bigGlyph zh redTx noselect">\u58a8</div><p class="dim small" style="margin-top:10px">loading\u2026</p></div>';
  loadDB().then(function(db){ DB = db; boot2(); });
}
function boot2(){
  applySettings();
  document.body.addEventListener('click', onTap);
  document.getElementById('backBtn').addEventListener('click', function(){ go('home'); });
  document.getElementById('settingsBtn').addEventListener('click', function(){ go('settings'); });
  var tabs = document.querySelectorAll('#tabbar button');
  for (var i = 0; i < tabs.length; i++) (function(b){
    b.addEventListener('click', function(){ go(b.getAttribute('data-tab')); });
  })(tabs[i]);
  window.addEventListener('resize', function(){ if (cur === 'characters' && CS.view === 'detail') initCanvas(); });
  render();
}

/* ============================================================
   SELF TEST — runs under Node (no DOM) for data validation
   ============================================================ */
function runSelfTest(){
  var errs = [];
  function chk(cond, msg){ if (!cond) errs.push(msg); }

  chk(VOCAB.length >= 300, 'VOCAB too small: ' + VOCAB.length);
  var catIds = CATS.map(function(c){ return c[0]; });
  var seen = {};
  VOCAB.forEach(function(v, i){
    if (seen[v.character] !== undefined) errs.push('dup word ' + v.character + ' @' + i + ' & @' + seen[v.character]);
    seen[v.character] = i;
    var derived = tonesOf(v.pinyin);
    if (derived !== v.tone) errs.push('tone mismatch @' + i + ' ' + v.character + ': field="' + v.tone + '" pinyin→"' + derived + '" (' + v.pinyin + ')');
    var nch = Array.from(v.character).length, nsy = v.pinyin.split(' ').length;
    if (nch !== nsy) errs.push('char/syll count @' + i + ' ' + v.character + ': ' + nch + ' chars vs ' + nsy + ' syllables');
    if (!v.exampleChinese || !v.exampleEnglish) errs.push('missing example @' + i + ' ' + v.character);
    if (catIds.indexOf(v.category) === -1) errs.push('bad category @' + i + ' "' + v.category + '"');
    v.pinyin.split(' ').forEach(function(sy){
      if (!/[1-5]$/.test(syllToNum(sy))) errs.push('unparsable syllable "' + sy + '" in ' + v.character);
    });
  });

  chk(CHARS.length === 150, 'CHARS length ' + CHARS.length);
  var cseen = {};
  CHARS.forEach(function(c){
    if (cseen[c.ch]) errs.push('dup char ' + c.ch);
    cseen[c.ch] = 1;
    if (!/[1-5]$/.test(syllToNum(c.py))) errs.push('char pinyin unparsable ' + c.ch + ' "' + c.py + '"');
  });
  Object.keys(STROKES).forEach(function(ch){
    if (!cseen[ch]) errs.push('STROKES key not in CHARS: ' + ch);
    STROKES[ch].forEach(function(st, si){
      if (st.length < 2) errs.push('stroke too short ' + ch + ' #' + si);
      st.forEach(function(p){
        if (!(p[0] >= 0 && p[0] <= 100 && p[1] >= 0 && p[1] <= 100)) errs.push('stroke point out of bounds in ' + ch);
      });
    });
  });

  var phraseLines = 0;
  PHRASES.forEach(function(P){
    P.lines.forEach(function(L, li){
      phraseLines++;
      if (!L.en) errs.push('phrase missing en ' + P.id + ' #' + li);
      L.toks.forEach(function(tk){
        if (!Array.isArray(tk) || tk.length !== 3) errs.push('bad token shape ' + P.id + ' #' + li);
        else if (tk[1]){
          tk[1].split(' ').forEach(function(sy){
            if (!/[1-5]$/.test(syllToNum(sy))) errs.push('phrase syllable unparsable "' + sy + '" in ' + P.id + ' #' + li);
          });
        }
      });
    });
  });

  MINIMAL_PAIRS.forEach(function(f){
    f.items.forEach(function(it){
      if (!/[1-5]$/.test(syllToNum(it[1]))) errs.push('pair unparsable ' + it[1]);
      if (syllBaseOnly(it[1]) !== f.base) errs.push('pair base mismatch "' + f.base + '" vs "' + it[1] + '" → ' + syllBaseOnly(it[1]));
    });
  });

  LEVELS.forEach(function(lv){ chk(MEDIA[lv] && MEDIA[lv].sections.length > 0, 'media missing ' + lv); });
  chk(PATH.length === 8, 'PATH length ' + PATH.length);
  chk(TIPS.length >= 5, 'TIPS too few');

  chk(applyToneMark('ni', 3) === 'nǐ', 'applyToneMark ni3 → ' + applyToneMark('ni', 3));
  chk(applyToneMark('lv', 4) === 'lǜ', 'applyToneMark lv4 → ' + applyToneMark('lv', 4));
  chk(applyToneMark('hao', 3) === 'hǎo', 'applyToneMark hao3 → ' + applyToneMark('hao', 3));
  chk(applyToneMark('liu', 2) === 'liú', 'applyToneMark liu2 → ' + applyToneMark('liu', 2));
  chk(applyToneMark('gui', 4) === 'guì', 'applyToneMark gui4 → ' + applyToneMark('gui', 4));
  chk(applyToneMark('dou', 1) === 'dōu', 'applyToneMark dou1 → ' + applyToneMark('dou', 1));
  chk(applyToneMark('xie', 4) === 'xiè', 'applyToneMark xie4 → ' + applyToneMark('xie', 4));
  chk(normPinyinInput('ni3hao3') === 'ni3 hao3', 'normPinyinInput ni3hao3 → "' + normPinyinInput('ni3hao3') + '"');
  chk(normPinyinInput('nǐ hǎo') === 'ni3 hao3', 'normPinyinInput marks → "' + normPinyinInput('nǐ hǎo') + '"');
  chk(wordToNum('xiè xie') === 'xie4 xie5', 'wordToNum neutral → ' + wordToNum('xiè xie'));

  srsRate('w0', 2);
  chk(DB.srs.w0 && DB.srs.w0.iv === 1, 'SRS first Good iv → ' + (DB.srs.w0 && DB.srs.w0.iv));
  srsRate('w0', 2);
  chk(DB.srs.w0.iv === 6, 'SRS second Good iv → ' + DB.srs.w0.iv);
  srsRate('w0', 0);
  chk(DB.srs.w0.iv === 0 && DB.srs.w0.reps === 0, 'SRS Again reset failed');

  if (errs.length){
    console.error('SELFTEST FAIL — ' + errs.length + ' problem(s):');
    errs.slice(0, 60).forEach(function(e){ console.error('  - ' + e); });
    if (typeof process !== 'undefined') process.exitCode = 1;
  } else {
    console.log('SELFTEST PASS — vocab:' + VOCAB.length + ' · chars:' + CHARS.length +
      ' · guided strokes:' + Object.keys(STROKES).length + ' · phrase lines:' + phraseLines +
      ' · pairs:' + MINIMAL_PAIRS.length + ' · media levels:' + LEVELS.length);
  }
}

if (IS_BROWSER){
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', boot);
  else boot();
} else {
  runSelfTest();
}
})();
</script>
